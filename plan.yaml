# Branchwork plan template
#
# Canonical schema reference: docs/reference/plan-schema.md
# (every field, types, optional vs. required, YAML vs. Markdown,
#  produces_commit, project inference, created_at).
#
# This file is a minimal example. Copy it into <claude-dir>/plans/
# (default ~/.claude/plans/), rename to <plan-name>.yaml, and adapt.
# Plans can also be written in Markdown (.md); YAML is preferred for
# new plans.
#
# Tasks that don't produce a commit (e.g. investigation, reproduction)
# should set `produces_commit: false` to hide the Merge button — see
# the canonical reference for details.

title: "Plan Title"
context: |
  Brief background explaining the motivation for this plan.
# Optional: explicit project association (otherwise inferred from file paths)
# project: my-project
# Optional: creation timestamp (otherwise uses file creation time)
# created_at: "2025-01-15T10:30:00Z"

phases:
  - number: 0
    title: "Phase Title"
    description: "Brief phase description."
    tasks:
      - number: "0.1"
        title: "Task Title"
        description: |
          Detailed description of what needs to be done.
        file_paths:
          - path/to/relevant/file.rs
          - path/to/another/file.ts
        acceptance: "Success criteria for this task."
        dependencies: []
        # produces_commit: false  # set on investigation/repro tasks to hide Merge

      - number: "0.2"
        title: "Second Task"
        description: |
          Another task that depends on the first.
        file_paths:
          - path/to/file.rs
        acceptance: "Tests pass."
        dependencies:
          - "0.1"

  - number: 1
    title: "Next Phase"
    description: "Builds on Phase 0."
    tasks:
      - number: "1.1"
        title: "Follow-up Task"
        description: |
          Depends on tasks from the previous phase.
        file_paths: []
        acceptance: "Feature works end-to-end."
        dependencies:
          - "0.1"
          - "0.2"
