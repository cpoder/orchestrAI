# E2E test environment for orchestrAI.
# Used by the e2e test suite and CI — not for production.
#
#   docker compose -f deploy/docker-compose.e2e.yml up -d
#   docker compose -f deploy/docker-compose.e2e.yml down -v

name: orchestrai-e2e

services:
  orchestrai:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${E2E_PORT:-3199}:3100"
    volumes:
      - orchestrai-e2e-data:/data
    environment:
      - ORCHESTRAI_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  orchestrai-e2e-data:
