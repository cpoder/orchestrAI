# One-command self-hosted deploy:
#   docker compose up -d
#
# Dashboard at http://localhost:3100

services:
  orchestrai:
    image: ghcr.io/cyrilpoder/orchestrai:${ORCHESTRAI_VERSION:-0.3.0}
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "${ORCHESTRAI_PORT:-3100}:3100"
    volumes:
      - orchestrai-data:/data
    environment:
      - ORCHESTRAI_WEBHOOK_URL=${ORCHESTRAI_WEBHOOK_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3100/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  orchestrai-data:
