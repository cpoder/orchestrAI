name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  server:
    name: Rust — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Keep all OSes running even if one fails so we see the full matrix.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        working-directory: server-rs

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server-rs/target
          key: ci-${{ matrix.os }}-${{ hashFiles('server-rs/Cargo.lock') }}
          restore-keys: ci-${{ matrix.os }}-

      # The build embeds web/dist via rust-embed, so it must exist.
      - name: Create web/dist placeholder (Unix)
        if: runner.os != 'Windows'
        run: mkdir -p ../web/dist && touch ../web/dist/index.html

      - name: Create web/dist placeholder (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ../web/dist | Out-Null
          New-Item -ItemType File -Force -Path ../web/dist/index.html | Out-Null

      - name: cargo fmt --check
        # Rustfmt output is identical across OSes; only run it once to save time.
        if: runner.os != 'Windows'
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --release --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --release

      - name: Install cargo-audit
        # cargo-audit is a pure-Rust audit tool; we only need it once per run.
        if: runner.os != 'Windows'
        run: cargo install cargo-audit --locked

      - name: cargo audit
        if: runner.os != 'Windows'
        run: cargo audit

  web:
    name: Web — typecheck, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @orchestrai/web build
